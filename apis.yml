aid: socialbee
name: SocialBee
description: SocialBee is an AI-powered social media management tool providing a
  REST-based platform API for managing content categories, scheduling and recycling
  evergreen posts, curating content from RSS sources, and accessing social media analytics
  across Facebook, Instagram, X (Twitter), LinkedIn, TikTok, Pinterest, YouTube,
  Threads, Bluesky, and Google Business Profiles. Third-party automation is available
  via Zapier, Make, and Pabbly connectors; a public REST API is on the long-term roadmap.
